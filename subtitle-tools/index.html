<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle Tools</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a237e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SubTools">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
            padding: 24px 20px;
        }

        h1 {
            color: #1a237e;
            font-size: 22px;
            margin-bottom: 16px;
        }

        .panel {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
            padding: 16px 20px;
            margin-bottom: 14px;
            max-width: 1000px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #888;
        }

        input[type="file"] {
            font-size: 14px;
            color: #333;
        }

        .encoding-badge {
            display: inline-block;
            padding: 6px 14px;
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #90caf9;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            min-width: 160px;
            text-align: center;
        }

        .encoding-badge.detected-ascii   { background: #f3e5f5; color: #6a1b9a; border-color: #ce93d8; }
        .encoding-badge.detected-utf8    { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
        .encoding-badge.detected-utf8bom { background: #e0f4e8; color: #1b5e20; border-color: #81c784; }
        .encoding-badge.detected-unknown { background: #fff3e0; color: #e65100; border-color: #ffb74d; }

        select {
            padding: 7px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            background: #fff;
            min-width: 230px;
            cursor: pointer;
        }
        select:focus { outline: none; border-color: #1976d2; box-shadow: 0 0 0 2px rgba(25,118,210,0.15); }

        .btn-download {
            padding: 8px 18px;
            background: #1976d2;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s;
            white-space: nowrap;
        }
        .btn-download:hover:not(:disabled) { background: #1565c0; }
        .btn-download:disabled { background: #b0bec5; cursor: not-allowed; }

        .memo-panel {
            max-width: 1000px;
        }

        textarea {
            width: 100%;
            height: 540px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.55;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: vertical;
            color: #222;
            background: #fafafa;
        }
        textarea:focus { outline: none; border-color: #1976d2; background: #fff; }

        .status-bar {
            margin-top: 6px;
            font-size: 12px;
            color: #888;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1000px;
            margin-bottom: 16px;
        }
        .app-header h1 { margin-bottom: 0; }

        #installBtn {
            display: none;
            padding: 7px 16px;
            background: #1a237e;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: background 0.18s;
        }
        #installBtn:hover { background: #283593; }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #aiConfigBtn {
            padding: 7px 16px;
            background: #fff;
            color: #1a237e;
            border: 1.5px solid #1a237e;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: background 0.18s, color 0.18s;
        }
        #aiConfigBtn:hover { background: #e8eaf6; }

        /* ── Modal ── */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-backdrop.open { display: flex; }

        .modal {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.22);
            padding: 28px 28px 22px;
            width: 420px;
            max-width: calc(100vw - 32px);
        }
        .modal h2 {
            font-size: 17px;
            color: #1a237e;
            margin-bottom: 20px;
        }
        .modal-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 16px;
        }
        .modal-field label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #888;
        }
        .modal-field input[type="password"],
        .modal-field input[type="text"],
        .modal-field select {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            min-width: unset;
            width: 100%;
        }
        .modal-field input:focus,
        .modal-field select:focus {
            outline: none;
            border-color: #1976d2;
            box-shadow: 0 0 0 2px rgba(25,118,210,0.15);
        }
        .modal-field .key-row {
            display: flex;
            gap: 6px;
        }
        .modal-field .key-row input { flex: 1; }
        .modal-field .toggle-key {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 20px;
        }
        .btn-cancel {
            padding: 8px 18px;
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cancel:hover { background: #ebebeb; }
        .btn-save {
            padding: 8px 18px;
            background: #1a237e;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s;
        }
        .btn-save:hover { background: #283593; }
        .modal-saved-note {
            font-size: 12px;
            color: #2e7d32;
            margin-top: 8px;
            min-height: 16px;
            text-align: right;
        }

        /* ── Translate button ── */
        .btn-translate {
            padding: 8px 18px;
            background: #00695c;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s;
            white-space: nowrap;
        }
        .btn-translate:hover:not(:disabled) { background: #00574a; }
        .btn-translate:disabled { background: #b0bec5; cursor: not-allowed; }

        /* ── Translation progress overlay ── */
        #translationOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 18px;
        }
        #translationOverlay.active { display: flex; }
        .spinner {
            width: 52px;
            height: 52px;
            border: 5px solid rgba(255,255,255,0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .translation-msg {
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
    </style>
</head>

<div class="panel">
    <div class="controls">

        <div class="control-group">
            <span class="control-label">Load Subtitle File (.srt)</span>
            <input type="file" id="fileInput" accept=".srt,.txt">
        </div>

                <option value="windows-1253">Windows-1253 — Greek</option>
                <option value="windows-1254">Windows-1254 — Turkish</option>
                <option value="windows-1255">Windows-1255 — Hebrew</option>
                <option value="windows-1256">Windows-1256 — Arabic</option>
                <option value="windows-1257">Windows-1257 — Baltic</option>
                <option value="windows-1258">Windows-1258 — Vietnamese</option>
            </select>
        </div>

        <div class="control-group">
            <span class="control-label">&nbsp;</span>
            <button class="btn-translate" id="translateBtn" disabled>&#127760; Translate</button>
        </div>

        <div class="control-group">

            <button class="btn-download" id="downloadBtn" disabled>&#8595; Download as UTF-8 with BOM</button>
        </div>

<div class="panel memo-panel">
    <textarea id="memoBox" readonly spellcheck="false"
        placeholder="Load an .srt file above to view its contents here..."></textarea>
    <div class="status-bar" id="statusBar"></div>
</div>

<script>
    'use strict';

    let rawBytes       = null;   // Uint8Array of original file bytes
    let hasBOM         = false;  // whether original file had UTF-8 BOM
    let originalName   = 'subtitle.srt';

    const fileInput        = document.getElementById('fileInput');
    const memoBox          = document.getElementById('memoBox');
    const detectedEncEl    = document.getElementById('detectedEncoding');
    const charsetSelect    = document.getElementById('charsetSelect');
    const downloadBtn      = document.getElementById('downloadBtn');
    const statusBar        = document.getElementById('statusBar');

    // ── Encoding detection ────────────────────────────────────────────────────

    function isValidUTF8(bytes) {
        let i = 0;
        while (i < bytes.length) {
            const b = bytes[i];
            if (b <= 0x7F) {
                i += 1;
            } else if ((b & 0xE0) === 0xC0) {
                if (i + 1 >= bytes.length || (bytes[i + 1] & 0xC0) !== 0x80) return false;
                i += 2;
            } else if ((b & 0xF0) === 0xE0) {
                if (i + 2 >= bytes.length ||
                    (bytes[i + 1] & 0xC0) !== 0x80 ||
                    (bytes[i + 2] & 0xC0) !== 0x80) return false;
                i += 3;
            } else if ((b & 0xF8) === 0xF0) {
                if (i + 3 >= bytes.length ||
                    (bytes[i + 1] & 0xC0) !== 0x80 ||
                    (bytes[i + 2] & 0xC0) !== 0x80 ||
                    (bytes[i + 3] & 0xC0) !== 0x80) return false;
                i += 4;
            } else {
                return false;
            }
        }
        return true;
    }

    function detectEncoding(bytes) {
        // UTF-8 BOM: EF BB BF
        if (bytes.length >= 3 &&
            bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) {
            return { label: 'UTF-8 with BOM', cssClass: 'detected-utf8bom', hasBOM: true };
        }
        // Pure ASCII (all bytes ≤ 127)
        let ascii = true;
        for (let i = 0; i < bytes.length; i++) {
            if (bytes[i] > 127) { ascii = false; break; }
        }
        if (ascii) {
            return { label: 'ASCII', cssClass: 'detected-ascii', hasBOM: false };
        }
        // Valid UTF-8 multi-byte sequences
        if (isValidUTF8(bytes)) {
            return { label: 'UTF-8', cssClass: 'detected-utf8', hasBOM: false };
        }
        // Likely a single-byte Windows codepage
        return { label: 'Unknown (select charset)', cssClass: 'detected-unknown', hasBOM: false };
    }

    // ── Decoding ──────────────────────────────────────────────────────────────

    /**
     * Decode bytes with the given WHATWG charset label.
     * If skipBOM is true, the first 3 bytes (UTF-8 BOM) are omitted before decoding.
     */
    function decodeBytes(bytes, charset, skipBOM) {
        const slice = (skipBOM && bytes.length >= 3) ? bytes.slice(3) : bytes;
        return new TextDecoder(charset, { fatal: false }).decode(slice);
    }

    // ── UI update ─────────────────────────────────────────────────────────────

    function setStatus(msg) {
        statusBar.textContent = msg;
    }

    function displayWithCharset(charset) {
        if (!rawBytes) return;
        const text = decodeBytes(rawBytes, charset, hasBOM);
        memoBox.value = text;
        const lines = text.split('\n').length;
        const chars = text.length;
        setStatus(`${lines.toLocaleString()} lines · ${chars.toLocaleString()} characters · decoded as ${charset}`);
    }

    // ── File loading ──────────────────────────────────────────────────────────

    fileInput.addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (!file) return;

        originalName = file.name;

        const reader = new FileReader();
        reader.onload = function (ev) {
            rawBytes = new Uint8Array(ev.target.result);

            const enc = detectEncoding(rawBytes);
            hasBOM = enc.hasBOM;

            // Update encoding badge
            detectedEncEl.textContent = enc.label;
            detectedEncEl.className   = 'encoding-badge ' + enc.cssClass;

            // Initial display:
            // - Unicode files → decode as UTF-8 (shows correct text immediately)
            // - Unknown        → decode as selected Windows charset
            if (enc.cssClass === 'detected-utf8bom' ||
                enc.cssClass === 'detected-utf8'    ||
                enc.cssClass === 'detected-ascii') {
                memoBox.value = decodeBytes(rawBytes, 'utf-8', hasBOM);
                const lines = memoBox.value.split('\n').length;
                setStatus(`${lines.toLocaleString()} lines · ${memoBox.value.length.toLocaleString()} characters · ${enc.label}`);
            } else {
                displayWithCharset(charsetSelect.value);
            }

            downloadBtn.disabled = false;
            translateBtn.disabled = false;
        };
        reader.readAsArrayBuffer(file);
    });

    // ── Charset change ────────────────────────────────────────────────────────

    charsetSelect.addEventListener('change', function () {
        if (!rawBytes) return;
        displayWithCharset(charsetSelect.value);
    });

    // ── Download ──────────────────────────────────────────────────────────────

    downloadBtn.addEventListener('click', function () {
        if (!rawBytes) return;

        const text = memoBox.value;

        // Encode to UTF-8 bytes, then prepend BOM manually
        const textBytes = new TextEncoder().encode(text);
        const bomBytes  = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const output    = new Uint8Array(bomBytes.length + textBytes.length);
        output.set(bomBytes,  0);
        output.set(textBytes, 3);

        const blob = new Blob([output], { type: 'text/plain' });
        const url  = URL.createObjectURL(blob);

        const baseName  = originalName.replace(/\.srt$/i, '');
        const outName   = baseName + '_utf8bom.srt';

        const anchor    = document.createElement('a');
        anchor.href     = url;
        anchor.download = outName;
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        URL.revokeObjectURL(url);
    });
</script>

<script>
    // ── AI Configuration ──────────────────────────────────────────────────────
    const AI_STORAGE_KEY = 'subtitleTools_aiConfig';

    const aiConfigBtn     = document.getElementById('aiConfigBtn');
    const aiModalBackdrop = document.getElementById('aiModalBackdrop');
    const aiApiKeyInput   = document.getElementById('aiApiKey');
    const aiModelSelect   = document.getElementById('aiModel');
    const aiModalCancel   = document.getElementById('aiModalCancel');
    const aiModalSave     = document.getElementById('aiModalSave');
    const aiSavedNote     = document.getElementById('aiSavedNote');
    const toggleKeyBtn    = document.getElementById('toggleKeyBtn');
    const loadModelsBtn   = document.getElementById('loadModelsBtn');
    const aiModelStatus   = document.getElementById('aiModelStatus');

    function loadAiConfig() {
        try {
            return JSON.parse(localStorage.getItem(AI_STORAGE_KEY)) || {};
        } catch { return {}; }
    }

    async function fetchGeminiModels(apiKey) {
        aiModelStatus.textContent = 'Loading models…';
        loadModelsBtn.disabled = true;
        try {
            const res = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models?key=${encodeURIComponent(apiKey)}`
            );
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                aiModelStatus.textContent = `Error: ${err?.error?.message || res.statusText}`;
                return;
            }
            const data = await res.json();
            const currentVal = aiModelSelect.value;
            // Keep only text-generative Gemini models (exclude embeddings, imagen, tts, etc.)
            const models = (data.models || [])
                .filter(m => (m.supportedGenerationMethods || []).includes('generateContent'))
                .map(m => m.name.replace(/^models\//, ''))  // strip "models/" prefix
                .filter(n => /^gemini-/i.test(n) && !/embed|imagen|tts|vision-only/i.test(n))
                .sort();
            if (!models.length) { aiModelStatus.textContent = 'No compatible models found.'; return; }
            aiModelSelect.innerHTML = models
                .map(m => `<option value="${m}">${m}</option>`)
                .join('');
            // Restore previously saved model if present
            if (models.includes(currentVal)) aiModelSelect.value = currentVal;
            aiModelStatus.textContent = `${models.length} model(s) loaded.`;
        } catch (e) {
            aiModelStatus.textContent = `Fetch failed: ${e.message}`;
        } finally {
            loadModelsBtn.disabled = false;
        }
    }

    async function openAiModal() {
        const cfg = loadAiConfig();
        aiApiKeyInput.value = cfg.apiKey || '';
        aiApiKeyInput.type  = 'password';
        toggleKeyBtn.textContent = 'Show';
        aiSavedNote.textContent  = '';
        aiModelStatus.textContent = '';
        aiModalBackdrop.classList.add('open');
        // Auto-load models if we already have a saved key
        if (cfg.apiKey) {
            await fetchGeminiModels(cfg.apiKey);
            if (cfg.model) aiModelSelect.value = cfg.model;
        }
        aiApiKeyInput.focus();
    }

    function closeAiModal() {
        aiModalBackdrop.classList.remove('open');
    }

    aiConfigBtn.addEventListener('click', openAiModal);
    aiModalCancel.addEventListener('click', closeAiModal);

    aiModalBackdrop.addEventListener('click', e => {
        if (e.target === aiModalBackdrop) closeAiModal();
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeAiModal();
    });

    toggleKeyBtn.addEventListener('click', () => {
        const isHidden = aiApiKeyInput.type === 'password';
        aiApiKeyInput.type = isHidden ? 'text' : 'password';
        toggleKeyBtn.textContent = isHidden ? 'Hide' : 'Show';
    });

    loadModelsBtn.addEventListener('click', () => {
        const key = aiApiKeyInput.value.trim();
        if (!key) { aiModelStatus.textContent = 'Enter an API key first.'; return; }
        fetchGeminiModels(key);
    });

    aiModalSave.addEventListener('click', () => {
        const key = aiApiKeyInput.value.trim();
        const model = aiModelSelect.value;
        if (!key)   { aiSavedNote.style.color = '#c62828'; aiSavedNote.textContent = 'API key is required.'; return; }
        if (!model) { aiSavedNote.style.color = '#c62828'; aiSavedNote.textContent = 'Select a model first.'; return; }
        const cfg = { apiKey: key, model };
        localStorage.setItem(AI_STORAGE_KEY, JSON.stringify(cfg));
        aiSavedNote.style.color = '#2e7d32';
        aiSavedNote.textContent = 'Configuration saved.';
        setTimeout(closeAiModal, 900);
    });
</script>

<script>
    // ── Translation ───────────────────────────────────────────────────────────
    const translateBtn       = document.getElementById('translateBtn');
    const translateBackdrop  = document.getElementById('translateBackdrop');
    const langSelect         = document.getElementById('langSelect');
    const translateCancel    = document.getElementById('translateCancel');
    const translateStart     = document.getElementById('translateStart');
    const translationOverlay = document.getElementById('translationOverlay');
    const translationMsg     = translationOverlay.querySelector('.translation-msg');

    translateBtn.addEventListener('click', () => {
        const cfg = loadAiConfig();
        if (!cfg.apiKey || !cfg.model) {
            alert('⚠️ Please configure AI first using the ⚙ AI Configuration button.');
            return;
        }
        translateBackdrop.classList.add('open');
    });

    translateCancel.addEventListener('click', () => translateBackdrop.classList.remove('open'));
    translateBackdrop.addEventListener('click', e => {
        if (e.target === translateBackdrop) translateBackdrop.classList.remove('open');
    });

    // Parse SRT into blocks: { num, ts, textLines }
    function parseSRT(text) {
        const blocks = text.trim().split(/\r?\n\s*\r?\n/);
        return blocks.map(block => {
            const lines = block.split(/\r?\n/).map(l => l.trimEnd());
            const num   = lines[0].trim();
            const hasTS = lines[1] && lines[1].includes('-->');
            const ts    = hasTS ? lines[1].trim() : null;
            const textLines = lines.slice(hasTS ? 2 : 1);
            return { num, ts, textLines };
        }).filter(b => /^\d+$/.test(b.num));
    }

    // Build stripped text (number + lines, no timestamps)
    function buildStripped(blocks) {
        return blocks.map(b => b.num + '\n' + b.textLines.join('\n')).join('\n\n');
    }

    // Reassemble SRT with original timestamps + translated text
    function reassembleSRT(blocks, translatedStripped) {
        // Parse translated text into map: blockNum -> translatedLines
        const transMap = {};
        const parts = translatedStripped.trim().split(/\n\s*\n/);
        for (const part of parts) {
            const lines = part.split('\n').map(l => l.trimEnd());
            // strip possible markdown code fences
            const num = lines[0].replace(/[^\d]/g, '');
            if (num) transMap[num] = lines.slice(1);
        }
        return blocks.map(b => {
            const tLines = (transMap[b.num] && transMap[b.num].length)
                ? transMap[b.num]
                : b.textLines;
            const ts = b.ts ? b.ts + '\n' : '';
            return b.num + '\n' + ts + tLines.join('\n');
        }).join('\n\n');
    }

    translateStart.addEventListener('click', async () => {
        const cfg = loadAiConfig();
        if (!cfg.apiKey || !cfg.model) { alert('AI not configured.'); return; }

        const srtText = memoBox.value;
        const blocks  = parseSRT(srtText);
        if (!blocks.length) { alert('No subtitle blocks found.'); return; }

        const targetLang = langSelect.value;
        const stripped   = buildStripped(blocks);

        translateBackdrop.classList.remove('open');
        translationMsg.textContent = `Translating to ${langSelect.options[langSelect.selectedIndex].text}…`;
        translationOverlay.classList.add('active');

        const prompt =
            `Translate the following subtitle text to ${targetLang}.\n` +
            `Return ONLY the translated subtitles in the exact same format: ` +
            `block number on its own line, then the translated text lines. ` +
            `Do not add any commentary, code fences, or extra text.\n\n` +
            stripped;

        try {
            const res = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(cfg.model)}:generateContent?key=${encodeURIComponent(cfg.apiKey)}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                }
            );
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err?.error?.message || res.statusText);
            }
            const data = await res.json();
            const translatedText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!translatedText) throw new Error('Empty response from API.');

            const result = reassembleSRT(blocks, translatedText);
            memoBox.value = result;
            const lines = result.split('\n').length;
            setStatus(`Translation complete · ${lines.toLocaleString()} lines · ${result.length.toLocaleString()} characters`);
        } catch (e) {
            alert(`Translation failed: ${e.message}`);
        } finally {
            translationOverlay.classList.remove('active');
        }
    });
</script>

<script>
    // ── PWA install prompt ────────────────────────────────────────────────────
    let _deferredInstallPrompt = null;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        _deferredInstallPrompt = e;
        installBtn.style.display = 'inline-block';
    });

    installBtn.addEventListener('click', async () => {
        if (!_deferredInstallPrompt) return;
        _deferredInstallPrompt.prompt();
        const { outcome } = await _deferredInstallPrompt.userChoice;
        if (outcome === 'accepted') installBtn.style.display = 'none';
        _deferredInstallPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
        _deferredInstallPrompt = null;
    });

    // ── Service Worker registration ────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('[SW] Registered, scope:', reg.scope))
                .catch(err => console.warn('[SW] Registration failed:', err));
        });
    }
</script>
